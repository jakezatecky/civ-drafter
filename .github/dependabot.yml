version: 2
updates:
  -
    package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    open-pull-requests-limit: 10
    versioning-strategy: increase-if-necessary
    ignore:
      -
        dependency-name: "*"
        update-types:
          - "version-update:semver-patch"
          - "version-update:semver-minor"
